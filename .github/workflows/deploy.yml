name: CI — Build UI

# Deployment is handled by a pull-based cron job on the server
# (scripts/server-deploy.sh polls origin/master every 2 minutes and
# self-updates). GitHub-hosted runners intermittently cannot complete the
# TCP handshake to the small Oracle free-tier instance, so inbound-SSH
# deploys are unreliable. This workflow now only validates that the UI
# builds cleanly on every push.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-ui:
    name: Build UI (validation)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build React UI
        run: |
          cd ui
          npm ci
          npm run build
